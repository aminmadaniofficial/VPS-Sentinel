<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>VPS Sentinel | Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #080808; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .active-tab-btn { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-10">
    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-black tracking-tighter flex items-center gap-3">
                <span class="bg-blue-600 p-2 rounded-lg"><i data-lucide="shield" class="text-white"></i></span>
                VPS SENTINEL <span class="text-blue-500 text-sm font-mono">v2.0</span>
            </h1>
            <p class="text-slate-500 text-sm mt-1">Infrastructure monitoring & system management</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden md:block">
                <p class="text-xs text-slate-500 uppercase font-bold">System Status</p>
                <p class="text-emerald-500 text-sm font-bold flex items-center gap-1 justify-end">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Operational
                </p>
            </div>
            <button onclick="window.location.href='/logout'" class="p-3 glass rounded-xl hover:bg-red-500/10 hover:text-red-500 transition">
                <i data-lucide="log-out"></i>
            </button>
        </div>
    </header>

    <div class="flex gap-4 mb-10 overflow-x-auto pb-2">
        <button id="btn-main" onclick="showTab('main')" class="tab-btn px-6 py-3 rounded-xl glass font-semibold flex items-center gap-2 active-tab-btn">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview
        </button>
        <button id="btn-procs" onclick="showTab('procs')" class="tab-btn px-6 py-3 rounded-xl glass font-semibold flex items-center gap-2">
            <i data-lucide="cpu" class="w-4 h-4"></i> Processes
        </button>
        <button id="btn-network" onclick="showTab('network')" class="tab-btn px-6 py-3 rounded-xl glass font-semibold flex items-center gap-2">
            <i data-lucide="globe" class="w-4 h-4"></i> Networking
        </button>
    </div>

    <div id="main-tab" class="tab-content active">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-lucide="cpu" class="w-12 h-12"></i></div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">CPU Usage</p>
                <h2 id="cpu-val" class="text-4xl font-black mt-2 text-blue-500">--%</h2>
            </div>
            <div class="glass p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-lucide="database" class="w-12 h-12"></i></div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Memory</p>
                <h2 id="mem-val" class="text-xl font-bold mt-3 text-purple-400">--</h2>
            </div>
            <div class="glass p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-lucide="hard-drive" class="w-12 h-12"></i></div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Storage</p>
                <h2 id="disk-val" class="text-4xl font-black mt-2 text-orange-500">--%</h2>
            </div>
            <div class="glass p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><i data-lucide="clock" class="w-12 h-12"></i></div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Uptime</p>
                <h2 id="uptime-val" class="text-sm font-mono mt-4 text-emerald-400">--</h2>
            </div>
        </div>
        <div class="glass p-8 rounded-[2rem]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg">Performance Graph</h3>
                <div class="flex gap-2"><span class="w-3 h-3 bg-blue-500 rounded-full"></span><span class="text-xs text-slate-500">Real-time CPU</span></div>
            </div>
            <canvas id="cpuChart" height="100"></canvas>
        </div>
    </div>

    <div id="procs-tab" class="tab-content">
        <div class="glass p-8 rounded-[2rem]">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="terminal"></i> Live Processes</h3>
                <button onclick="fetchData()" class="p-2 hover:bg-white/5 rounded-lg transition"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-xs uppercase tracking-tighter">
                    <tr class="border-b border-white/5">
                        <th class="pb-4">PID</th>
                        <th class="pb-4">Memory %</th>
                        <th class="pb-4">CPU %</th>
                        <th class="pb-4">Command / Process</th>
                    </tr>
                    </thead>
                    <tbody id="proc-body" class="mono text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="network-tab" class="tab-content">
        <div class="glass p-8 rounded-[2rem]">
            <h3 class="text-xl font-bold mb-8 flex items-center gap-2"><i data-lucide="share-2"></i> Active Network Listeners</h3>
            <div id="port-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let cpuChart;

    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab-btn'));
        document.getElementById(name + '-tab').classList.add('active');
        document.getElementById('btn-' + name).classList.add('active-tab-btn');
    }

    async function fetchData() {
        try {
            const statsRes = await fetch('/api/v1/monitor/stats');
            const stats = await statsRes.json();
            document.getElementById('cpu-val').innerText = stats.cpuLoad;
            document.getElementById('mem-val').innerText = stats.memory;
            document.getElementById('disk-val').innerText = stats.diskUsage + '%';
            document.getElementById('uptime-val').innerText = stats.uptime;
            updateChart(parseFloat(stats.cpuLoad));

            const extRes = await fetch('/api/v1/monitor/extended');
            const extData = await extRes.json();

            const procBody = document.getElementById('proc-body');
            procBody.innerHTML = extData.processes.map(p => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                        <td class="py-4 text-blue-500 font-bold">${p[0]}</td>
                        <td class="text-slate-400">${p[1]}%</td>
                        <td class="text-orange-500 font-bold">${p[2]}%</td>
                        <td class="text-slate-300 font-mono text-xs">${p[3]}</td>
                    </tr>
                `).join('');

            const portList = document.getElementById('port-list');
            portList.innerHTML = extData.ports.map(p => `
                    <div class="p-5 glass rounded-2xl flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-md font-bold uppercase">${p[0]}</span>
                            <span class="text-[10px] text-emerald-500 font-bold">LISTEN</span>
                        </div>
                        <span class="mono text-sm font-bold tracking-tight">${p[1]}</span>
                    </div>
                `).join('');
        } catch (e) { console.error("Update failed", e); }
    }

    function initChart() {
        const ctx = document.getElementById('cpuChart').getContext('2d');
        cpuChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    borderColor: '#3b82f6',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: (context) => {
                        const chart = context.chart;
                        const {ctx, chartArea} = chart;
                        if (!chartArea) return null;
                        const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                        gradient.addColorStop(0, 'rgba(59, 130, 246, 0)');
                        gradient.addColorStop(1, 'rgba(59, 130, 246, 0.1)');
                        return gradient;
                    }
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569' } },
                    x: { display: false }
                }
            }
        });
    }

    function updateChart(val) {
        const now = new Date().toLocaleTimeString();
        cpuChart.data.labels.push(now);
        cpuChart.data.datasets[0].data.push(val);
        if (cpuChart.data.labels.length > 30) { cpuChart.data.labels.shift(); cpuChart.data.datasets[0].data.shift(); }
        cpuChart.update('none');
    }

    initChart();
    setInterval(fetchData, 3000);
    fetchData();
</script>
</body>
</html>
