<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VPS Sentinel | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

<div class="glass w-full max-auto max-w-[400px] p-10 rounded-[2.5rem] shadow-2xl">
    <div class="text-center mb-10">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-600/20">
            <i data-lucide="shield" class="text-white w-8 h-8"></i>
        </div>
        <h1 class="text-2xl font-black tracking-tighter">SECURE ACCESS</h1>
        <p class="text-slate-500 text-sm mt-2">Enter credentials to manage Sentinel</p>
    </div>

    <div th:if="${param.error}" class="bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-xl text-xs mb-6 text-center">
        Invalid username or password.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <label class="text-[10px] uppercase font-bold text-slate-500 ml-2 mb-1 block">Username</label>
            <input type="text" name="username" required
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500/50 transition">
        </div>
        <div>
            <label class="text-[10px] uppercase font-bold text-slate-500 ml-2 mb-1 block">Password</label>
            <input type="password" name="password" required
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500/50 transition">
        </div>
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-600/10 mt-6">
            Sign In
        </button>
    </form>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
